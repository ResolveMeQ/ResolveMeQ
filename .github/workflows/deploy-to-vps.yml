name: Deploy Django Backend to VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g., latest, v1.0.0, main-abc123)'
        required: true
        default: 'latest'
      vps_host:
        description: 'VPS hostname or IP address'
        required: true
      ssh_user:
        description: 'SSH username'
        required: true
        default: 'root'
      deployment_path:
        description: 'Deployment path on VPS'
        required: true
        default: '/opt/resolvemeq'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase repository owner
        id: lowercase
        run: |
          echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ inputs.vps_host }} >> ~/.ssh/known_hosts

      - name: Setup deployment directory and copy files
        env:
          SSH_USER: ${{ inputs.ssh_user }}
          VPS_HOST: ${{ inputs.vps_host }}
          DEPLOY_PATH: ${{ inputs.deployment_path }}
        run: |
          # Combine directory setup and file copy in one step
          ssh ${SSH_USER}@${VPS_HOST} "sudo mkdir -p ${DEPLOY_PATH} && sudo chown -R ${SSH_USER}:${SSH_USER} ${DEPLOY_PATH}"
          scp docker-compose.production.yml ${SSH_USER}@${VPS_HOST}:${DEPLOY_PATH}/docker-compose.yml

      - name: Prepare environment and Docker registry
        run: |
          ssh ${{ inputs.ssh_user }}@${{ inputs.vps_host }} << ENDSSH
          set -e
          cd ${{ inputs.deployment_path }}
          
          # Create shared network if not exists
          if ! docker network inspect resolvemeq-shared >/dev/null 2>&1; then
            docker network create resolvemeq-shared
            echo "✅ Created resolvemeq-shared network"
          fi
          
          # Update .env file with deployment variables
          echo "Updating .env file with deployment variables..."
          if [ -f .env ]; then
            sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=${{ inputs.image_tag }}/' .env
            sed -i 's/^GITHUB_REPOSITORY_OWNER=.*/GITHUB_REPOSITORY_OWNER=${{ steps.lowercase.outputs.owner }}/' .env
            grep -q "^IMAGE_TAG=" .env || echo "IMAGE_TAG=${{ inputs.image_tag }}" >> .env
            grep -q "^GITHUB_REPOSITORY_OWNER=" .env || echo "GITHUB_REPOSITORY_OWNER=${{ steps.lowercase.outputs.owner }}" >> .env
            echo "✅ .env file updated (preserved existing configuration)"
          else
            echo "⚠️  Warning: .env file does not exist. Please create it manually."
            exit 1
          fi
          
          # Login to GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "✅ Logged into GitHub Container Registry"
          ENDSSH

      - name: Deploy and start services
        run: |
          ssh ${{ inputs.ssh_user }}@${{ inputs.vps_host }} << ENDSSH
          set -e
          cd ${{ inputs.deployment_path }}
          
          echo "📦 Stopping old containers and removing old images..."
          docker compose down || true
          docker rmi ghcr.io/${{ steps.lowercase.outputs.owner }}/resolvemeq-web:${{ inputs.image_tag }} || true
          docker rmi ghcr.io/${{ steps.lowercase.outputs.owner }}/resolvemeq-celery:${{ inputs.image_tag }} || true
          
          echo "⬇️  Pulling fresh images..."
          docker compose pull --ignore-pull-failures
          
          echo "🚀 Starting services..."
          docker compose up -d
          
          echo "⏳ Waiting for services to start..."
          sleep 10
          
          echo "🔄 Running migrations..."
          docker compose exec -T web python manage.py migrate --noinput
          
          echo "📁 Collecting static files..."
          docker compose exec -T web python manage.py collectstatic --noinput --clear
          
          echo "🧹 Cleaning up unused images..."
          docker image prune -f
          
          echo "✅ Deployment steps completed"
          ENDSSH

      - name: Health check and verify deployment
        run: |
          ssh ${{ inputs.ssh_user }}@${{ inputs.vps_host }} << ENDSSH
          cd ${{ inputs.deployment_path }}
          
          # Check if all services are running
          if docker compose ps | grep -q "Up"; then
            echo "✅ Deployment successful! Services are running."
            docker compose ps
          else
            echo "❌ Deployment failed! Some services are not running."
            docker compose logs --tail=50
            exit 1
          fi
          ENDSSH

      - name: Send deployment notification
        if: always()
        run: |
          echo "Deployment completed for image tag: ${{ inputs.image_tag }}"
          echo "Agent image tag: ${{ inputs.agent_image_tag }}"
          echo "VPS: ${{ inputs.vps_host }}"
          echo "Path: ${{ inputs.deployment_path }}"
