<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You were mentioned - {{app_name}}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #0f172a; background: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #6366f1 0%, #0ea5e9 100%); padding: 22px 30px; text-align: center; }
        .header h1 { color: white; font-size: 20px; margin: 0; }
        .content { padding: 26px 30px; }
        .mention-box { background: #eef2ff; border-left: 4px solid #6366f1; padding: 14px 16px; margin: 16px 0; border-radius: 0 10px 10px 0; }
        .cta { display: inline-block; background: #0ea5e9; color: white !important; text-decoration: none; padding: 12px 22px; border-radius: 8px; font-weight: 700; margin: 14px 0; }
        .muted { font-size: 13px; color: #64748b; }
        .footer { padding: 16px 30px; text-align: center; color: #64748b; font-size: 12px; border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>You were mentioned</h1>
        </div>
        <div class="content">
            <p>Hi {{recipient_name}},</p>
            <div class="mention-box">
                <p style="margin:0;">
                    <strong>{{actor_name}}</strong> mentioned you{% if context_title %} in <strong>{{context_title}}</strong>{% endif %}.
                </p>
            </div>
            <a href="{{view_url}}" class="cta">View mention</a>
            <p class="muted">You receive this because mention emails are enabled in your {{app_name}} settings.</p>
        </div>
        <div class="footer">{{app_name}}</div>
    </div>
</body>
</html>
