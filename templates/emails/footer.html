<!-- Shared email footer — uses same context as other transactional emails (app_name, frontend_url, support_email). -->
<table class="row-content stack" style="background-color: #061A40; width: 680px; margin: 0 auto;">
    <tr>
        <td style="padding: 48px; text-align: center;">
            <h3 style="color: #ffffff; font-size: 24px; margin: 0 0 24px;">{{ app_name|default:"ResolveMeQ" }}</h3>

            <p style="color: #ffffff; font-size: 12px; margin: 24px auto; max-width: 80%; line-height: 1.6;">
                This is a notification from
                <a href="{{ frontend_url|default:'https://app.resolvemeq.net' }}" style="color: #3acf9b;">{{ frontend_url|default:'https://app.resolvemeq.net' }}</a>.
                {% if support_email %}
                If you need support, contact us at
                <a href="mailto:{{ support_email }}" style="color: #3acf9b;">{{ support_email }}</a>.
                {% endif %}
            </p>
        </td>
    </tr>
</table>
