<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Someone's on it - {{app_name}}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; background: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #0d9488 0%, #115e59 100%); padding: 24px 30px; text-align: center; }
        .header h1 { color: white; font-size: 20px; margin: 0; }
        .content { padding: 28px 30px; }
        .ticket-box { background: #f0fdfa; border-left: 4px solid #0d9488; padding: 16px; margin: 20px 0; border-radius: 0 8px 8px 0; }
        .cta { display: inline-block; background: #0d9488; color: white !important; text-decoration: none; padding: 12px 22px; border-radius: 8px; font-weight: 600; margin: 16px 0; }
        .footer { padding: 18px 30px; text-align: center; color: #64748b; font-size: 12px; border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Someone's on it</h1>
        </div>
        <div class="content">
            <p>Hi {{recipient_name}},</p>
            <p><strong>{{agent_name}}</strong> is now looking into ticket <strong>#{{ticket_id}}</strong>.</p>
            <div class="ticket-box">
                <strong>{{issue_type}}</strong><br>
                <span style="color:#64748b;">Category:</span> {{category}}
                {% if eta_text %}<br><span style="color:#64748b;">{{eta_text}}</span>{% endif %}
            </div>
            <a href="{{view_url}}" class="cta">View ticket</a>
            <p style="font-size:13px;color:#64748b;">You receive this because ticket update emails are enabled in your ResolveMeQ settings.</p>
        </div>
        <div class="footer">{{app_name}}</div>
    </div>
</body>
</html>
